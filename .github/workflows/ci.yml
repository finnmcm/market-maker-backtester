name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  correctness:
    name: build + test (${{ matrix.preset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [debug, tsan, asan]
    env:
      CC: clang
      CXX: clang++
      TSAN_OPTIONS: halt_on_error=1
      ASAN_OPTIONS: halt_on_error=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake clang
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Test
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure --no-tests=ignore

  release-bench:
    name: release build + bench
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake clang
      - name: Configure
        run: cmake --preset release
      - name: Build
        run: cmake --build --preset release
      - name: Test
        run: ctest --test-dir build/release --output-on-failure --no-tests=ignore
      # NOTE: latency numbers from shared CI runners are noisy and NOT authoritative.
      # This job builds the benchmarks to catch breakage; measure real latency
      # locally on a quiet, CPU-pinned machine.
